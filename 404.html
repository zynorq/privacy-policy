<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found</title>

    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>

    <section class="hero"
        style="min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center;">

        <div class="hero-content">

            <div class="lang-en">
                <h1 style="font-size: 90px; color: var(--primary); margin-bottom: 10px;">404</h1>

                <h2 style="font-size: 24px; margin-bottom: 15px; color: var(--text);">
                    Page Not Found
                </h2>

                <p style="max-width: 520px; margin: 0 auto 30px;">
                    The page you are looking for does not exist or may have been moved.
                </p>

                <a href="index.html" class="btn primary-btn">Return Home</a>
            </div>

            <div class="lang-ar" style="display: none;">

                <h1 style="font-size: 90px; color: var(--primary); margin-bottom: 10px;">404</h1>

                <h2 style="font-size: 24px; margin-bottom: 15px; color: var(--text);">
                    الصفحة غير موجودة
                </h2>

                <p style="max-width: 520px; margin: 0 auto 30px;">
                    الصفحة التي تبحث عنها غير موجودة أو ربما تم نقلها.
                </p>

                <a href="index.html" class="btn primary-btn">العودة للرئيسية</a>
            </div>

        </div>

    </section>

</body>

</html>
